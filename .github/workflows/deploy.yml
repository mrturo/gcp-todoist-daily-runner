# GitHub Actions workflow for deploying to Google Cloud Run
#
# Requisitos previos:
# - Crear un secreto en GitHub llamado GCP_SA_KEY con la key JSON de una Service Account con permisos de Cloud Run Admin y Artifact Registry Writer.
# - Configurar los valores de proyecto, región y nombre del servicio abajo.

name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE: gcp-todoist-daily-runner
  PORT: 3000
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: gcp-todoist-daily-runner
  SERVICE: gcp-todoist-daily-runner
  TIME_ZONE: ${{ secrets.TIME_ZONE }}
  TODOIST_SECRET_ID: ${{ secrets.TODOIST_SECRET_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:$GITHUB_SHA .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:$GITHUB_SHA \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=PORT=${{ env.PORT }},TIME_ZONE=${{ env.TIME_ZONE }},TODOIST_SECRET_ID=${{ env.TODOIST_SECRET_ID }}
